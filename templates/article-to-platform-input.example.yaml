# 这份输入模板现在按“少填也能用”设计。
# 通常至少只需要填写 `source.source_article`。
# 其他字段都有默认思路；只有你想更精确控制时再补。

# 必填：原始文章
source:
  # 可选：原文标题，没有也可以留空，让 prompt 自行概括
  source_title: ""
  # 原始文章全文，直接粘贴在这里
  source_article: |
    在这里粘贴原始文章全文。

# 常用设置：修改 `target_platform` 后，脚本会自动注入对应平台的预设规则。
# 当前内置常见平台：知乎、小红书、公众号、微博、抖音、B站。
# 如果没有命中，会自动回退到通用图文规则。
platform:
  # 不改的话默认就按知乎来用
  target_platform: "知乎"
  # 可选：如果不填，prompt 会根据原文推断最合适的读者群体
  target_audience: ""
  # 可选：这里只写“额外补充要求”。
  # 目标平台的基础规则会由脚本按 `target_platform` 自动带入 prompt。
  platform_style_requirements: |
    
  # 可选：留空时默认按目标平台预设篇幅处理
  length_requirement: ""

# 按需补充：下面几项留空时，会优先按目标平台预设自动填充
output:
  # 一般不用改，除非你有特殊交付格式；留空则按平台预设组成
  required_output_parts: []
  # 留空则按平台预设标题规则
  headline_requirement: ""
  # 留空则按平台预设开头规则
  hook_requirement: ""
  # 留空则按平台预设结尾规则
  ending_requirement: ""
  # 留空则按平台预设标签规则
  tag_requirement: ""

# 按需补充：只有你确实有不能丢的信息时再填
content_guardrails:
  # 可留空：不填时 prompt 会先自行提炼关键事实
  facts_that_must_be_retained: []
  # 可留空：有专有名词、产品名、方法名时再填
  terms_not_to_change: []
  # 可选：例如“不要写得像营销文”“保留原文立场”“不要新增案例”
  extra_constraints: |
    严格保留原意，不要补充原文没有的新事实、新数据、新案例。

# 高级设置：通常先不用填，后面人工跑完上一步再回填
intermediate:
  structured_article_notes: |
    
  platform_draft: |
    

# 运行配置：一般保持默认
runtime:
  output_dir: "outputs"
  review_focus: |
    重点检查是否偏离原意、是否遗漏关键事实、是否新增原文没有的信息。
