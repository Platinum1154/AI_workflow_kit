# 原始文章信息
source:
  # 原文标题
  source_title: "在这里填写原文标题"
  # 原文语言，例如：中文、英文
  source_language: "中文"
  # 文章类型，例如：公众号文章、新闻稿、产品稿、通用文章
  article_type: "通用文章"
  # 原始文章全文，直接粘贴在这里
  source_article: |
    在这里粘贴原始文章全文。

# 原意保护规则
meaning_rules:
  # 是否必须严格保留核心信息，一般保持 true
  core_message_must_be_preserved: true
  # 是否允许压缩内容
  compression_allowed: false
  # 是否允许为了适配平台而调整原文结构
  structure_reorganization_allowed: false
  # 是否允许在不改变原意的前提下换一种表达方式
  rephrasing_allowed_without_changing_meaning: true
  # 是否允许补充原文没有的新信息，一般保持 false
  new_information_allowed: false

# 目标平台信息
platform:
  # 目标平台名称，例如：小红书、公众号、知乎、微博
  target_platform: "在这里填写目标平台"
  # 目标受众，例如：大学生、职场人、宝妈、产品经理
  target_audience: "在这里填写目标受众"
  # 平台风格要求，写清楚语气、结构、节奏、表达方式
  platform_style_requirements: |
    在这里填写平台写作风格要求。
  # 文稿长度要求，例如：300-500字、1000字以内
  length_requirement: "在这里填写长度要求"

# 输出内容要求
output:
  # 最终文稿必须包含哪些部分，例如：标题、正文、摘要、标签、结尾引导
  required_output_parts:
    - "标题"
    - "正文"
  # 标题要求，例如：要有钩子、不要夸张、控制字数
  headline_requirement: "在这里填写标题要求"
  # 开头要求，例如：前两句点出主题、先抛问题
  hook_requirement: "在这里填写开头要求"
  # 结尾要求，例如：总结收束、互动提问、行动引导
  ending_requirement: "在这里填写结尾要求"
  # 标签要求，例如：是否需要 hashtags、数量限制、风格限制
  tag_requirement: "在这里填写标签要求"

# 内容保护与限制
content_guardrails:
  # 后续改写时必须保留的事实，建议一条一条列清楚
  facts_that_must_be_retained:
    - "在这里填写必须保留的事实 1"
    - "在这里填写必须保留的事实 2"
  # 不允许被替换、改写或删掉的术语、专有名词、固定表述
  terms_not_to_change:
    - "在这里填写不可改动的术语 1"
    - "在这里填写不可改动的术语 2"
  # 额外约束，例如：不能口语化、不能加入案例、不能改动立场
  extra_constraints: |
    在这里填写额外限制、禁区或特殊说明。
